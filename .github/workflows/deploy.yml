name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.93.1

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Linux audio deps
        run: sudo apt-get update && sudo apt-get install -y pkg-config libasound2-dev

      - name: Build release binary
        run: cargo build --release

      - name: Copy binary to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: target/release/tune
          target: /tmp/tune-deploy
          strip_components: 2

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/test_env/tui_music/
            git pull origin master
            mkdir -p /home/test_env/tui_music/target/release
            install -m 755 /tmp/tune-deploy/tune /home/test_env/tui_music/target/release/tune
            systemctl daemon-reload
            systemctl restart tune
            sleep 1
            systemctl is-active tune && echo "tune is running" || echo "WARNING: tune failed to start"
