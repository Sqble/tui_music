name: Deploy to VPS

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /home/test_env/tui_music/
            git pull origin master
            cargo build --release
            systemctl daemon-reload
            systemctl restart tune
            sleep 1
            systemctl is-active tune && echo "tune is running" || echo "WARNING: tune failed to start"
